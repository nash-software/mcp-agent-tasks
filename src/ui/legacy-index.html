<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agent-tasks dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3748;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 52px;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #a78bfa;
      white-space: nowrap;
    }

    nav { display: flex; gap: 0.25rem; }

    nav button {
      background: none;
      border: none;
      color: #94a3b8;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 0.15s, color 0.15s;
    }

    nav button:hover { background: #2d3748; color: #e2e8f0; }
    nav button.active { background: #312e81; color: #a78bfa; }

    main { padding: 1.5rem; }

    /* Tab visibility */
    body:not([data-active-view="board"]) [data-view="board"] { display: none; }
    body:not([data-active-view="roadmap"]) [data-view="roadmap"] { display: none; }
    body:not([data-active-view="activity"]) [data-view="activity"] { display: none; }

    /* Board */
    [data-kanban] {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    [data-column] {
      background: #1a1d2e;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1rem;
      min-height: 200px;
    }

    [data-column] h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2d3748;
    }

    [data-column="todo"] h2 { color: #60a5fa; }
    [data-column="in_progress"] h2 { color: #f59e0b; }
    [data-column="blocked"] h2 { color: #f87171; }
    [data-column="done"] h2 { color: #34d399; }

    .cards { display: flex; flex-direction: column; gap: 0.5rem; }

    .card {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 0.625rem 0.75rem;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 0.25rem;
    }

    .card-meta {
      font-size: 0.7rem;
      color: #64748b;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-feature { background: #1d4ed8; color: #bfdbfe; }
    .badge-bug { background: #7f1d1d; color: #fecaca; }
    .badge-chore { background: #374151; color: #d1d5db; }
    .badge-spike { background: #6b21a8; color: #e9d5ff; }
    .badge-spec { background: #064e3b; color: #a7f3d0; }
    .badge-high { background: #7f1d1d; color: #fecaca; }
    .badge-medium { background: #78350f; color: #fde68a; }
    .badge-low { background: #1c3d5a; color: #bae6fd; }

    .col-count {
      display: inline-block;
      margin-left: 0.5rem;
      background: #2d3748;
      color: #94a3b8;
      border-radius: 10px;
      padding: 0 0.4rem;
      font-size: 0.7rem;
    }

    /* Roadmap */
    .milestone-list { display: flex; flex-direction: column; gap: 1rem; max-width: 640px; }

    .milestone-card {
      background: #1a1d2e;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1rem;
    }

    .milestone-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }

    .milestone-title { font-size: 0.9rem; font-weight: 600; }

    .milestone-status {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
    }

    .milestone-status.open { background: #1d4ed8; color: #bfdbfe; }
    .milestone-status.closed { background: #374151; color: #9ca3af; }

    .progress-bar-wrap {
      background: #2d3748;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .progress-bar {
      height: 100%;
      background: #6d28d9;
      border-radius: 4px;
      transition: width 0.3s;
    }

    .milestone-meta { font-size: 0.7rem; color: #64748b; margin-top: 0.35rem; }

    /* Activity */
    .activity-list { display: flex; flex-direction: column; gap: 0; max-width: 600px; }

    .activity-item {
      display: flex;
      gap: 1rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid #1e2433;
    }

    .activity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 0.35rem;
      flex-shrink: 0;
      background: #6d28d9;
    }

    .activity-body { flex: 1; }

    .activity-title { font-size: 0.8rem; font-weight: 500; }

    .activity-meta { font-size: 0.7rem; color: #64748b; margin-top: 0.15rem; }

    .status-arrow {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .status-from { color: #64748b; }
    .status-to.done { color: #34d399; }
    .status-to.in_progress { color: #f59e0b; }
    .status-to.blocked { color: #f87171; }
    .status-to.todo { color: #60a5fa; }

    .empty { color: #4b5563; font-size: 0.85rem; padding: 1rem 0; }

    @media (max-width: 768px) {
      [data-kanban] { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 480px) {
      [data-kanban] { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-active-view="board">

<header>
  <h1>agent-tasks</h1>
  <nav id="nav">
    <button data-tab="board" class="active">Board</button>
    <button data-tab="roadmap">Roadmap</button>
    <button data-tab="activity">Activity</button>
  </nav>
</header>

<main>
  <section data-view="board">
    <div data-kanban>
      <div data-column="todo">
        <h2>Todo <span class="col-count" id="count-todo">0</span></h2>
        <div class="cards" id="col-todo"></div>
      </div>
      <div data-column="in_progress">
        <h2>In Progress <span class="col-count" id="count-in_progress">0</span></h2>
        <div class="cards" id="col-in_progress"></div>
      </div>
      <div data-column="blocked">
        <h2>Blocked <span class="col-count" id="count-blocked">0</span></h2>
        <div class="cards" id="col-blocked"></div>
      </div>
      <div data-column="done">
        <h2>Done <span class="col-count" id="count-done">0</span></h2>
        <div class="cards" id="col-done"></div>
      </div>
    </div>
  </section>

  <section data-view="roadmap">
    <div class="milestone-list" id="milestone-list">
      <p class="empty">Loading milestones...</p>
    </div>
  </section>

  <section data-view="activity">
    <div class="activity-list" id="activity-list">
      <p class="empty">Loading activity...</p>
    </div>
  </section>
</main>

<script>
  // ── Tab navigation ────────────────────────────────────────────────────────────
  document.getElementById('nav').addEventListener('click', function(e) {
    const btn = e.target.closest('[data-tab]');
    if (!btn) return;
    const tab = btn.dataset.tab;
    document.body.dataset.activeView = tab;
    document.querySelectorAll('nav button').forEach(function(b) {
      b.classList.toggle('active', b === btn);
    });
  });

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str ?? '').replace(/[&<>"']/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function relativeTime(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    if (isNaN(diff)) return iso;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';
  }

  function badgeHtml(cls, text) {
    return '<span class="badge badge-' + esc(cls) + '">' + esc(text) + '</span>';
  }

  // ── Board ─────────────────────────────────────────────────────────────────────
  function renderCard(task) {
    var labels = '';
    if (task.labels && task.labels.length) {
      labels = task.labels.slice(0, 3).map(function(l) {
        return '<span style="background:#1e293b;border-radius:3px;padding:0 0.3rem;font-size:0.65rem;color:#94a3b8">' + esc(l) + '</span>';
      }).join(' ');
    }
    return '<div class="card">'
      + '<div class="card-title">' + esc(task.title) + '</div>'
      + '<div class="card-meta">'
      + '<span>' + esc(task.id) + '</span>'
      + badgeHtml(task.type, task.type)
      + badgeHtml(task.priority, task.priority)
      + labels
      + '</div>'
      + '</div>';
  }

  function renderBoard(tasks) {
    var columns = { todo: [], in_progress: [], blocked: [], done: [] };
    tasks.forEach(function(t) {
      if (columns[t.status] !== undefined) columns[t.status].push(t);
    });

    Object.keys(columns).forEach(function(col) {
      var el = document.getElementById('col-' + col);
      var countEl = document.getElementById('count-' + col);
      var list = columns[col];
      countEl.textContent = list.length;
      if (list.length === 0) {
        el.innerHTML = '';
      } else {
        el.innerHTML = list.map(renderCard).join('');
      }
    });
  }

  // ── Roadmap ───────────────────────────────────────────────────────────────────
  function renderMilestones(milestones, tasks) {
    var el = document.getElementById('milestone-list');
    if (!milestones.length) {
      el.innerHTML = '<p class="empty">No milestones found.</p>';
      return;
    }

    el.innerHTML = milestones.map(function(m) {
      var related = tasks.filter(function(t) { return t.milestone === m.id; });
      var done = related.filter(function(t) { return t.status === 'done'; }).length;
      var pct = related.length > 0 ? Math.round((done / related.length) * 100) : 0;
      var due = m.due_date ? ' &middot; Due ' + esc(m.due_date.slice(0, 10)) : '';
      return '<div class="milestone-card">'
        + '<div class="milestone-header">'
        + '<div class="milestone-title">' + esc(m.title) + '</div>'
        + '<span class="milestone-status ' + esc(m.status) + '">' + esc(m.status) + '</span>'
        + '</div>'
        + '<div class="milestone-meta">' + esc(m.id) + due + ' &middot; ' + done + '/' + related.length + ' tasks</div>'
        + '<div class="progress-bar-wrap"><div class="progress-bar" style="width:' + pct + '%"></div></div>'
        + '</div>';
    }).join('');
  }

  // ── Activity ──────────────────────────────────────────────────────────────────
  function renderActivity(activity) {
    var el = document.getElementById('activity-list');
    if (!activity.length) {
      el.innerHTML = '<p class="empty">No recent activity.</p>';
      return;
    }

    el.innerHTML = activity.slice(0, 50).map(function(a) {
      return '<div class="activity-item">'
        + '<div class="activity-dot"></div>'
        + '<div class="activity-body">'
        + '<div class="activity-title">' + esc(a.title) + '</div>'
        + '<div class="activity-meta">'
        + '<span class="status-arrow">'
        + '<span class="status-from">' + esc(a.from_status) + '</span>'
        + ' &rarr; '
        + '<span class="status-to ' + esc(a.to_status) + '">' + esc(a.to_status) + '</span>'
        + '</span>'
        + ' &middot; ' + esc(a.task_id)
        + (a.reason ? ' &middot; ' + esc(a.reason) : '')
        + ' &middot; ' + relativeTime(a.at)
        + '</div>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  // ── Fetch and render ──────────────────────────────────────────────────────────
  var allTasks = [];

  Promise.all([
    fetch('/api/tasks').then(function(r) { return r.json(); }),
    fetch('/api/milestones').then(function(r) { return r.json(); }),
    fetch('/api/activity').then(function(r) { return r.json(); }),
  ]).then(function(results) {
    allTasks = results[0];
    var milestones = results[1];
    var activity = results[2];

    renderBoard(allTasks);
    renderMilestones(milestones, allTasks);
    renderActivity(activity);
  }).catch(function(err) {
    console.error('Dashboard fetch error:', err);
    document.querySelector('main').innerHTML = '<p style="color:#f87171;padding:2rem">Error loading data: ' + esc(String(err)) + '</p>';
  });
</script>
</body>
</html>
